[hilmar-hogni]
name = "Hilmar Høgni"
title = "TÚ ERT HILMAR HØGNI!"
role = "Maskinførari"
tagline = "Starvið sum maskinførari hóskar væl til tín."
image = "images/profiles/hilmar-hogni.jpg"
paragraphs = [
  "Tú trívist best, tá nakað veruliga flytir seg. Fyri teg gevur arbeiðið meining, tá tú sært úrslitið beinanvegin.",
  "Tú ert praktisk/ur, arbeiðssom/ur og ikki bangin fyri at taka fat. Har onnur tosa um loysnir, ert tú longu farin í gongd við at fremja tær.",
  "Tú trívist best úti í markini, har maskinur, tempo og ítøkilig úrslit eru ein natúrligur partur av gerandisdegnum. Tað kann vera í vegaumsitingini ella innan asfalt- og skervframleiðslu."
]

[filip]
name = "Filip"
title = "TÚ ERT FILIP!"
role = "Smiður"
tagline = "Starvið sum smiður hóskar væl til tín."
image = "images/profiles/filip.jpg"
paragraphs = [
  "Tú ert tekniskt sterkur, nágreinilig/ur og loysnsinnað/ur. Tú gevst ikki, fyrr enn tað riggar, og tú hevur eitt natúrligt forvitni fyri, hvussu skipanir og tøkni hanga saman. Fyri teg er ein trupulleiki ikki ein forðing – tað er ein avbjóðing.",
  "Tú trívist best, har tú kanst arbeiða við hondunum og fáa teknikkin at spæla – til dømis sum smiður í einum av okkara verkstøðum."
]

[sigurd]
name = "Sigurð"
title = "TÚ ERT SIGURÐ!"
role = "Maskinmeistari"
tagline = "Starvið sum maskinmeistari hóskar væl til tín."
image = "images/profiles/sigurd.jpg"
paragraphs = [
  "Tú ert rólig/ur, álítandi og hevur gott skil á tingunum. Tú hevur gott eyga fyri skipanum og samanhangum og trívist við at tryggja, at alt koyrir, sum tað skal. Tú ert tann, sum varnast trupulleikar, áðrenn teir vísa seg.",
  "Tú trívist í leiklutum við ábyrgd av rakstri, eftirliti og tekniskum skipanum.",
  "Tað kann til dømis vera sum maskinist ella maskinmeistari innan rakstur og viðlíkahald, ella tú kanst arbeiða við orkuumvæling av bygningum landsins."
]

[haraldur]
name = "Haraldur"
title = "TÚ ERT HARALDUR!"
role = "Verkætlanarleiðari"
tagline = "Starvið sum verkætlanarleiðari hóskar væl til tín."
image = "images/profiles/haraldur.jpg"
paragraphs = [
  "Tú ert skipað/ur og dugir væl at finna loysnir. Tú dugir at samstava við nógvar partar og harvið gera hugskot til veruleika. Tú trívist í samspælinum millum ætlan og praksis.",
  "Tú hóskar væl til verkætlanir, har nakað skal skapast. Tú ert dugnalig/ur at halda yvirlit og tryggja framgongd í verkætlanini.",
  "Tú kanst arbeiða sum verkætlanarleiðari við ábyrgd av nýbygging ella av umvæling og viðlíkahaldi av bygningum landsins. Tað kann eisini vera innan infrakervi, við denti á planlegging av vegum, brúm og tunlum.",
  "Tú ert ofta útbúgvin sum verkfrøðingur, byggifrøðingur ella arkitektur."
]

[marita]
name = "Marita"
title = "TÚ ERT MARITA!"
role = "Fulltrúi"
tagline = "Starvið sum fulltrúi hóskar væl til tín."
image = "images/profiles/marita.jpg"
paragraphs = [
  "Tú ert greinandi, hugsandi og dugir væl at arbeiða við fløktum málum. Tú setur spurningar, sært samanhangir og tryggjar, at avgerðir verða tiknar á einum væl grundaðum grundarlagi.",
  "Tú trívist í leiklutum, har yvirlit, fakligheit og haldgóðar metingar eru avgerandi.",
  "Tíni áhugamál og útbúgving avgerða hvat tú kanst arbeiða við hjá okkum – tað kann eitt nú verða sum løgfrøðingur, controller, analytikari, við málsviðgerð, verkætlanararbeiðið ella innan HR ella samskifti."
]

[hanna]
name = "Hanna"
title = "TÚ ERT HANNA!"
role = "Skrivstovufólk"
tagline = "Starvið sum skrivstovufólk hóskar væl til tín."
image = "images/profiles/hanna.jpg"
paragraphs = [
  "Har onnur missa yvirlitið, fært tú lutirnar at hanga saman. Tú heldur skil á smálutum og tryggjar, at gerandisdagurin glíður – eisini tá nógv er at gera.",
  "Tú ert skipað/ur, tænastusinnað/ur og dugir væl at fáa bæði uppgávur og fólk at spæla saman.",
  "Tíni áhugamál og útbúgving avgerða hvat tú kanst arbeiða við hjá okkum – tað kann til dømis verða at arbeiða við bókhaldi, KT-support ella fyrisitingarligum uppgávum."
]
