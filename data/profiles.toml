[haraldur]
name = "Haraldur"
title = "TÚ ERT HARALDUR!"
role = "Rørleiðari"
tagline = "Starvið sum rørleiðari hóskar væl til tín."
image = "/images/profiles/haraldur.jpg"
paragraphs = [
  "Tú ert praktiskur/praktisk, sjálvstøðug/ur og trivst úti í øllum veðrum. Tú hevur góðar hendur og eygað fyri at gera ting rætt.",
  "Tú arbeiðir við rørleiðingar – alt frá hitaveitu til vatn og frárennsli. Tað er handverk, sum krevur bæði líkamligan styrk og fagligt yvirlit.",
  "Hjá Landsverk kanst tú arbeiða við rørleiðingar í stórum byggiverkætlunum – bæði nýggjum og gamlum. Tað kann vera í sambandi við bygningar, vegar ella aðrar infrastrukturverkætlanir.",
  "Tú ert ofta útbúgvin sum rørsmiður ella hevur annan handaverksbakgrunn."
]

[marjun]
name = "Marjun"
title = "TÚ ERT MARJUN!"
role = "Verkætlanarættleiðari"
tagline = "Starvið sum verkætlanarættleiðari hóskar væl til tín."
image = "/images/profiles/marjun.jpg"
paragraphs = [
  "Tú ert skipað/ur, grundig/ur og dugir væl at samskifta. Tú heldur yvirlit og tryggjar, at alt kemur á pláss.",
  "Tú arbeiðir við at stýra og fylgja verkætlunum frá byrjan til enda – at alt verður gjørt á rættum tíma, innan fíggjarligan ramma og eftir ætlan.",
  "Hjá Landsverk kanst tú arbeiða við øllum slag av byggiverkætlunum – frá nýbyggjum til umvælingar og viðlíkahald.",
  "Tú ert ofta útbúgvin sum verkfrøðingur, byggifrøðingur ella hevur annan háskúlabakgrunn."
]

[filip]
name = "Filip"
title = "TÚ ERT FILIP!"
role = "Verkætlanarleiðari"
tagline = "Starvið sum verkætlanarleiðari hóskar væl til tín."
image = "/images/profiles/filip.jpg"
paragraphs = [
  "Tú ert skipað/ur, loysnarsinnað/ur og dugir væl at gera hugskot til veruleika. Tú trivst í samspælinum millum ætlan og praksis.",
  "Tú hóskar væl til verkætlanir, har nakað skal skapast. Tú ert dugnalig/ur at halda yvirlit og tryggja framdrift í verkætlanini – og tað er avgerandi, tá Landsverk er landsins byggiharri.",
  "Tú kanst arbeiða sum verkætlanarleiðari við ábyrgd av nýbygging ella av umvæling og viðlíkahaldi av bygningum landsins. Tað kann eisini vera innan infrastruktur, við denti á planlegging av vegum, brúm og tunlum.",
  "Tú ert ofta útbúgvin sum verkfrøðingur, byggifrøðingur ella arkitektur."
]

[anna]
name = "Anna"
title = "TÚ ERT ANNA!"
role = "Kommunikatión og umsiting"
tagline = "Starvið innan kommunikatión og umsiting hóskar væl til tín."
image = "/images/profiles/anna.jpg"
paragraphs = [
  "Tú ert góð/ur til at kommunikera, bæði skrivliga og munnliga. Tú hevur yvirlit og kanst seta teg inn í ymiskar støður.",
  "Tú arbeiðir við at greiða frá og umsita – hvort seg er innanhýsis kommunikatión, almenn miðling ella administrativu verkætlanir.",
  "Hjá Landsverk kanst tú arbeiða við umsiting, marknaðarføring, personalumsiting ella øðrum umsitingarverkum.",
  "Tú ert ofta útbúgvin við háskúlaútbúgving innan kommunikatión, umsiting ella líknandi."
]

[jens]
name = "Jens"
title = "TÚ ERT JENS!"
role = "Smiður/Mekanikari"
tagline = "Starvið sum smiður ella mekanikari hóskar væl til tín."
image = "/images/profiles/jens.jpg"
paragraphs = [
  "Tú ert handlagður/handløg og trivst í verkstøðini. Tú hevur eygað fyri at gera ting og kanst finna loysn, tá onnur geva upp.",
  "Tú arbeiðir við maskinur, jarn og ólík handaverksverktyg. Tú kanst sveisa, bøta og byggja – og tú dugir at brúka bæði nýggja og gamla teknologi.",
  "Hjá Landsverk kanst tú arbeiða í smiðjuni við viðlíkahaldi av maskinari og utrústingi ella á byggiplássinum við jarnsmiðaarbeiði.",
  "Tú ert ofta útbúgvin sum smiður, mekanikari ella hevur annan handaverksbakgrunn."
]

[katrin]
name = "Katrin"
title = "TÚ ERT KATRIN!"
role = "Elektrikar/Teknikari"
tagline = "Starvið sum elektrikar ella teknikari hóskar væl til tín."
image = "/images/profiles/katrin.jpg"
paragraphs = [
  "Tú ert tøknilig/ur, neyv/ur og kanst halda fokus, tá aðrir missa tráðin. Tú trivst millum leiðningar, skermur og maskinur.",
  "Tú arbeiðir við elektrisku systemir og tøkniligar innrættingar – bæði í bygningum og í infrastrukturi. Tú tryggjar, at alt virkar, sum tað skal.",
  "Hjá Landsverk kanst tú arbeiða við elektrisku innrættingar í bygningum, á vegum ella í tunlum. Tað kann eisini vera drift og viðlíkahald av tøkniligum systemum.",
  "Tú ert ofta útbúgvin sum elektrikar, automatiseringarteknikari ella hevur annan tøkniligan bakgrunn."
]
