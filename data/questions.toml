[[questions.options]]
text = "Officepakkin, ein strategiætlan og eitt eintak av “Thinking, Fast and Slow”"
points = { marita = 1 }
[[questions.options]]
text = "Ein stóran pakka av post-it, ein tráðleysan telefonløðara og Panodil – um ein starvsfelagi verður sjúkur"
points = { hanna = 1 }

