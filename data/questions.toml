[[questions.options]]
text = "Keep calm and build things"
points = { haraldur = 1 }
[[questions.options]]
text = "Hope is not a strategy"
points = { marita = 1 }
[[questions.options]]
text = "Certified Chaos Coordinator"
points = { hanna = 1 }

[[questions]]
id = 8
title = "Tú hevur arbeitt hart við umsóknini til Landsverk. Hvat stendur í profiltekstinum á tínum CV?"
subtitle = ""
[[questions.options]]
text = "“Trívist best við ítøkiligum uppgávum, har framgongd og sjónlig úrslit eru í fokus”"
points = { hilmar-hogni = 1 }
[[questions.options]]
text = "“Finni feilir, loysi trupulleikar og gevist ikki, fyrrenn tað riggar”"
points = { filip = 1 }
[[questions.options]]
text = "“Tryggi støðugan rakstur og havi yvirlit yvir skipanir og samanhangir”"
points = { sigurd = 1 }
[[questions.options]]
text = "“Tryggi samanhang og fakliga góðsku í verkætlanum frá hugskoti til veruleika”"
points = { haraldur = 1 }
[[questions.options]]
text = "“Havi greinandi tilgongd og taki avgerðir á einum fakligum grundarlagi”"
points = { marita = 1 }
[[questions.options]]
text = "“Skapi yvirlit og skipan, so gerandisdagurin glíður betur”"
points = { hanna = 1 }

