[[questions]]
id = 4
title = "Tú skalt á skeið og hevur glett teg í fleiri mánaðir. Skeiðið eitur:"
subtitle = ""
[[questions.options]]
text = "“Eingin slingur í valsinum: Salt og kavarudding við trygdini fremst”"
