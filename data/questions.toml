[[questions]]
id = 1
title = "Kennir tú teg mest heima"
subtitle = ""
[[questions.options]]
text = "Við útsýni yvir Funningsfjørð, meðan tú arbeiðir við einum rørporti og lurta eftir útvarpinum"
points = { hilmar-hogni = 1 }
[[questions.options]]
text = "Í smiðjuni við einari skrúvunøgl í hondini, trygdarbrillum í lummanum og lukti av olju í hárinum"
points = { filip = 1 }
[[questions.options]]
text = "Millum durandi maskinur í teknikk-rúminum við einum mátiamboði í hondini"
points = { sigurd = 1 }
[[questions.options]]
text = "Tá tú lyftir blikkið frá skitsuni á iPadinum og sært, hvussu verkætlanin tekur skap á byggiplássinum"
points = { haraldur = 1 }
[[questions.options]]
text = "Í einum fullum fundarrúmi, har tú greiðir frá smálutunum í verkætlanarætlanini við hjálp frá tínum PowerPointi"
points = { marita = 1 }
[[questions.options]]
text = "Aftan fyri skíggjan í einum mjúkum skrivstovustóli við fingrunum á tastaturinum, meðan tú tosar í headsetinum"
points = { hanna = 1 }

