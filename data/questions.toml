[[questions.options]]
text = "At skula taka avgerð, grundað á búkkenslu"
points = { marita = 1 }
[[questions.options]]
text = "Eitt óskipað skriviborð og 117 ósvaraðir teldupostar"
points = { hanna = 1 }

[[questions]]
id = 6
title = "Ein starvsfelagi sigur: “vit hava ein trupulleika”. Tú svarar:"
subtitle = ""
[[questions.options]]
text = "“Tað klári eg!”"
points = { hilmar-hogni = 1 }
[[questions.options]]
text = "“Ja, so er alt sum tað plagar 😊”"
points = { filip = 1 }
[[questions.options]]
text = "“Tað er ikki so farligt. Lat okkum kanna skipanina”"
points = { sigurd = 1 }
[[questions.options]]
text = "“Fínt – lat okkum gera eina ætlan”"
points = { haraldur = 1 }
[[questions.options]]
text = "“Lat meg fyrst finna váðametingina fram”"
points = { marita = 1 }
[[questions.options]]
text = "“Lat okkum fáa yvirlit – eg savni fólkini”"
points = { hanna = 1 }

[[questions]]
id = 7
title = "Mostir hevur keypt tær eina t-shirt á eini vikuskiftisferð í Edinburgh. Hvat stendur á henni?"
subtitle = ""
[[questions.options]]
text = "I like to move it, move it"
points = { hilmar-hogni = 1 }
[[questions.options]]
text = "Fix-it mode: ON"
points = { filip = 1 }
[[questions.options]]
text = "Eat. Sleep. Maintain the system."
