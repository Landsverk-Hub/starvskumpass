[[questions.options]]
text = "“Traktortøkni: Framkomnar umvælingar og ábøtur”"
points = { filip = 1 }
[[questions.options]]
text = "“Tryggur rakstur: Finn skipanarfeilir og fyribyrg katastrofu”"
points = { sigurd = 1 }
[[questions.options]]
